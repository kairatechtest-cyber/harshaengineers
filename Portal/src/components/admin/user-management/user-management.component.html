
<div class="text-white">
  <h2 class="text-xl font-semibold mb-4">Users</h2>
  
  @if (isLoading()) {
    <div class="flex justify-center items-center p-8">
      <div class="animate-spin h-8 w-8 border-t-2 border-r-2 border-indigo-400 rounded-full"></div>
    </div>
  } @else {
    <div class="overflow-x-auto bg-black/20 rounded-lg">
      <table class="min-w-full text-sm text-left">
        <thead class="bg-white/10 text-gray-300 uppercase tracking-wider">
          <tr>
            <th scope="col" class="px-6 py-3">Name</th>
            <th scope="col" class="px-6 py-3">Email</th>
            <th scope="col" class="px-6 py-3">Group</th>
            <th scope="col" class="px-6 py-3">Status</th>
            <th scope="col" class="px-6 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/10">
          @for (user of users(); track user.id) {
            <tr class="hover:bg-white/5">
              <td class="px-6 py-4 font-medium whitespace-nowrap">{{ user.firstName }} {{ user.lastName }}</td>
              <td class="px-6 py-4 text-gray-300">{{ user.email }}</td>
              <td class="px-6 py-4 text-gray-300">{{ getGroupName(user.groupId) }}</td>
              <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium rounded-full" [class]="user.status === 'ENABLED' ? 'bg-green-500/30 text-green-300' : 'bg-red-500/30 text-red-300'">
                  {{ user.status }}
                </span>
              </td>
              <td class="px-6 py-4 text-right space-x-2">
                <button (click)="onToggleStatus(user)" class="font-medium text-indigo-400 hover:text-indigo-300">
                  {{ user.status === 'ENABLED' ? 'Disable' : 'Enable' }}
                </button>
                <button (click)="openReassignModal(user)" class="font-medium text-indigo-400 hover:text-indigo-300">Reassign</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

  <!-- Reassign Group Modal -->
  @if (editingUser(); as user) {
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
      <div class="w-full max-w-md rounded-xl bg-gray-800 p-6 shadow-2xl border border-white/10">
        <h3 class="text-lg font-semibold">Reassign Group for {{ user.email }}</h3>
        <form [formGroup]="reassignForm" (ngSubmit)="onReassignGroup()" class="mt-4 space-y-4">
          <div>
            <label for="group" class="block text-sm font-medium text-gray-200">Select Group</label>
            <select formControlName="groupId" id="group" class="mt-1 block w-full rounded-md border-gray-500 bg-white/20 py-2 px-3 text-white placeholder-gray-400 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
              @for (group of groups(); track group.id) {
                <option [value]="group.id" class="bg-gray-700">{{ group.name }}</option>
              }
            </select>
          </div>
          <div class="mt-6 flex justify-end space-x-4">
            <button type="button" (click)="closeReassignModal()" class="rounded-md bg-white/10 px-4 py-2 text-sm font-medium hover:bg-white/20">Cancel</button>
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium hover:bg-indigo-700">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
